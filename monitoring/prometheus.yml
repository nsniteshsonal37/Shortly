global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "url-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["url-service:8000"]
  - job_name: 'auth-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-service:8000']
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]